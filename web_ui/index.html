<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Smart Farming UI</title>
    <style>
        body {font-family: Arial, sans-serif; margin: 2rem;}
        .section {margin-bottom: 2rem;}
        label {display: block; margin-top: 0.5rem;}
        textarea {width: 100%; height: 80px;}
        button {margin-top: 1rem; padding: 0.5rem 1rem;}
        pre {background:#f4f4f4; padding:1rem;}
    </style>
</head>
<body>
    <h1>Smart Farming Assistant</h1>

    <div class="section" id="weather-section">
        <h2>Current Weather</h2>
        <button onclick="fetchWeather()">Load Weather</button>
        <pre id="weather-output"></pre>
    </div>

    <div class="section" id="sensor-section">
        <h2>Sensor Data</h2>
        <button onclick="fetchSensor()">Load Sensor Data</button>
        <pre id="sensor-output"></pre>
    </div>

    <div class="section" id="image-analysis-section">
        <h2>Image Analysis</h2>
        <label for="image-analysis-input">Upload plant image:</label>
        <input type="file" id="image-analysis-input" accept="image/*" />
        <button onclick="analyzeImage()">Analyze Image</button>
        <pre id="image-analysis-output"></pre>
    </div>

    <div class="section" id="recommend-section">
        <h2>Text Recommendation</h2>
        <label for="prompt">Prompt:</label>
        <textarea id="prompt" placeholder="What fertilizer should I apply today?"></textarea>
        <button onclick="getTextRecommendation()">Get Recommendation</button>
        <pre id="recommend-output"></pre>
    </div>

    <script>
        const apiBase = "http://localhost:8000"; // Change if your API is hosted elsewhere
        async function fetchWeather() {
            // Example coordinates (change as needed)
            const lat = -6.2, lon = 106.8;
            const resp = await fetch(`${apiBase}/weather?lat=${lat}&lon=${lon}`);
            const data = await resp.json();
            document.getElementById('weather-output').textContent = JSON.stringify(data, null, 2);
        }
        async function fetchSensor() {
            const resp = await fetch(`${apiBase}/sensor`);
            const data = await resp.json();
            document.getElementById('sensor-output').textContent = JSON.stringify(data, null, 2);
        }
        async function analyzeImage() {
            const imageInput = document.getElementById('image-analysis-input');
            if (!imageInput.files[0]) {
                alert('Please select an image to analyze');
                return;
            }

            const form = new FormData();
            form.append('image', imageInput.files[0]);

            const resp = await fetch(`${apiBase}/analyze-image`, {
                method: 'POST',
                body: form,
            });
            const data = await resp.json();
            document.getElementById('image-analysis-output').textContent = data.description;
        }

        async function getTextRecommendation() {
            const prompt = document.getElementById('prompt').value;
            if (!prompt.trim()) {
                alert('Please enter a prompt');
                return;
            }

            const form = new FormData();
            form.append('prompt', prompt);

            const resp = await fetch(`${apiBase}/recommend`, {
                method: 'POST',
                body: form,
            });
            const data = await resp.json();
            document.getElementById('recommend-output').textContent = data.recommendation;
        }
    </script>
</body>
</html>
